  <script>
    // =============================================
    // GALLERY CONFIGURATION - ADD YOUR IMAGES HERE
    // =============================================
    // Put your image files in an 'art' folder, then add them like this:
    const galleryImages = [
      { src: 'art/art.png', caption: '' },
      { src: 'art/art1.png', caption: '' },
      { src: 'art/art2.png', caption: '' },
      { src: 'art/art3.png', caption: '' },
      { src: 'art/art4.png', caption: '' },
      { src: 'art/art5.png', caption: '' },
      { src: 'art/art6.png', caption: '' },
      { src: 'art/art7.png', caption: '' },
      { src: 'art/art8.png', caption: '' },
      { src: 'art/art9.png', caption: '' },
      { src: 'art/art10.png', caption: '' },
    ];
    // =============================================

    let currentIndex = 0;
    let autoRotateInterval = null;
    let isPaused = false;

    const imageEl = document.getElementById('gallery-image');
    const captionEl = document.getElementById('gallery-caption');
    const dotsContainer = document.getElementById('gallery-dots');
    const currentIndexEl = document.getElementById('current-index');
    const totalImagesEl = document.getElementById('total-images');
    const placeholder = document.querySelector('.gallery-placeholder');

    function initGallery() {
      if (galleryImages.length === 0) {
        placeholder.style.display = 'flex';
        imageEl.style.display = 'none';
        totalImagesEl.textContent = '0';
        return;
      }

      placeholder.style.display = 'none';
      imageEl.style.display = 'block';
      totalImagesEl.textContent = galleryImages.length;

      // Create dots
      galleryImages.forEach((_, index) => {
        const dot = document.createElement('span');
        dot.classList.add('gallery-dot');
        if (index === 0) dot.classList.add('active');
        dot.addEventListener('click', () => {
          pauseAutoRotate();
          goToImage(index);
        });
        dotsContainer.appendChild(dot);
      });

      showImage(0);
      startAutoRotate();
    }

    function showImage(index) {
      if (galleryImages.length === 0) return;

      currentIndex = index;
      if (currentIndex < 0) currentIndex = galleryImages.length - 1;
      if (currentIndex >= galleryImages.length) currentIndex = 0;

      imageEl.src = galleryImages[currentIndex].src;
      imageEl.alt = galleryImages[currentIndex].caption || 'Artwork';
      captionEl.textContent = galleryImages[currentIndex].caption || '';
      currentIndexEl.textContent = currentIndex + 1;

      // Update dots
      document.querySelectorAll('.gallery-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === currentIndex);
      });
    }

    function goToImage(index) {
      showImage(index);
    }

    function nextImage() {
      showImage(currentIndex + 1);
    }

    function prevImage() {
      showImage(currentIndex - 1);
    }

    // Auto-rotate functions
    function startAutoRotate() {
      if (galleryImages.length <= 1) return;
      autoRotateInterval = setInterval(() => {
        if (!isPaused) {
          nextImage();
        }
      }, 2000);
    }

    function pauseAutoRotate() {
      isPaused = true;
      // Resume after 10 seconds of no interaction
      setTimeout(() => {
        isPaused = false;
      }, 10000);
    }

    // Event listeners
    document.querySelector('.gallery-nav.prev').addEventListener('click', () => {
      pauseAutoRotate();
      prevImage();
    });

    document.querySelector('.gallery-nav.next').addEventListener('click', () => {
      pauseAutoRotate();
      nextImage();
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') {
        pauseAutoRotate();
        prevImage();
      }
      if (e.key === 'ArrowRight') {
        pauseAutoRotate();
        nextImage();
      }
    });

    // Initialize
    initGallery();
  </script>
