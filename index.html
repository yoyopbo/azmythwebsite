  <style>
    /* Kill all decorative overlays */
    .magical-bg,
    .magical-bg::before,
    .magical-bg::after,
    .simple-frame,
    body::before,
    body::after { display: none !important; }

    body { background: #000; }

    /* Thinner nav */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      padding-top: 0.15rem;
      padding-bottom: 0.15rem;
    }

    /* Full-bleed scrollable portrait */
    .hero {
      position: relative;
      min-height: 200vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 38vh;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('portrait.png') center 35% / cover no-repeat;
      z-index: 0;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 1;
    }

    .portrait-container { display: none; }

    .hero-content {
      position: relative;
      z-index: 2;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    .hero-text {
      text-align: center;
    }

    .hero-text h1 { display: none; }

    .subtitle-star { display: none; }

    .nav-links a { color: rgba(201,162,39,0.6) !important; }
    .logo { color: rgba(201,162,39,0.6) !important; }

    .hero-text .subtitle {
      font-size: 0.85rem;
      text-shadow: none;
      background: rgba(0,0,0,0.55);
      box-shadow: 0 0 25px 18px rgba(0,0,0,0.55);
      border-radius: 2px;
      margin-top: 18vh;
    }
  </style>
