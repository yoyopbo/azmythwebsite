    .mood-container {
      max-width: 560px;
      margin: 0 auto;
      text-align: center;
      padding: 3rem 2rem 4rem;
    }

    .mood-emoji {
      font-size: 7rem;
      line-height: 1;
      margin-bottom: 1.5rem;
      display: block;
      filter: drop-shadow(0 0 40px rgba(201,162,39,0.3));
      animation: floatMood 4s ease-in-out infinite;
    }

    @keyframes floatMood {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .mood-label {
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 4px;
      color: var(--gold-light, #e8d48b);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
    }

    .mood-note {
      font-size: 1.05rem;
      color: var(--silver, #b8b8c8);
      line-height: 1.7;
      font-style: italic;
      max-width: 400px;
      margin: 1.5rem auto 0;
      opacity: 0.85;
    }

    .mood-updated {
      margin-top: 2.5rem;
      font-size: 0.78rem;
      letter-spacing: 1.5px;
      color: var(--silver, #b8b8c8);
      opacity: 0.4;
      text-transform: uppercase;
    }

    .mood-scale {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 3rem;
    }

    .mood-pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(201,162,39,0.2);
      border: 1px solid rgba(201,162,39,0.25);
      transition: background 0.4s;
    }

    .mood-pip.filled {
      background: rgba(201,162,39,0.7);
      border-color: rgba(201,162,39,0.8);
      box-shadow: 0 0 8px rgba(201,162,39,0.4);
    }

    .mood-loading {
      color: var(--silver, #b8b8c8);
      opacity: 0.4;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }
  </style>

  <script>
    const MOODS = [
      { emoji: '😔', label: 'really low' },
      { emoji: '😕', label: 'not great' },
      { emoji: '😐', label: 'okay' },
      { emoji: '🙂', label: 'pretty good' },
      { emoji: '😊', label: 'feeling good' },
      { emoji: '🤩', label: 'amazing' },
    ];

    fetch('mood.json?v=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const level = Math.max(1, Math.min(6, data.level || 4));
        const mood = MOODS[level - 1];
        const pips = MOODS.map((_, i) =>
          `<div class="mood-pip${i < level ? ' filled' : ''}"></div>`
        ).join('');

        document.getElementById('mood-container').innerHTML = `
          <span class="mood-emoji">${mood.emoji}</span>
          <div class="mood-label">${mood.label}</div>
          <div class="mood-scale">${pips}</div>
          ${data.note ? `<div class="mood-note">"${data.note}"</div>` : ''}
          ${data.updated ? `<div class="mood-updated">updated ${data.updated}</div>` : ''}
        `;
      })
      .catch(() => {
        document.getElementById('mood-container').innerHTML =
          '<span class="mood-emoji">🌙</span><div class="mood-label">somewhere out there</div>';
      });
  </script>
