<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Canceled | Mysticloak</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .canceled {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem;
    }

    .canceled-content {
      max-width: 500px;
    }

    .canceled-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      color: var(--amethyst-bright);
      text-shadow: 0 0 30px rgba(122, 82, 153, 0.5);
    }

    .canceled-content h1 {
      font-size: 2.5rem;
      font-weight: normal;
      color: var(--gold);
      margin-bottom: 1rem;
      letter-spacing: 3px;
      text-shadow:
        0 0 30px rgba(201, 162, 39, 0.4),
        0 0 60px rgba(201, 162, 39, 0.2);
    }

    .canceled-content p {
      color: var(--silver);
      line-height: 1.8;
      margin-bottom: 1.5rem;
      font-style: italic;
    }

    .canceled-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="magical-bg"></div>
  <div class="simple-frame"></div>

  <nav>
    <a href="index.html" class="logo"><img src="images/brand/mysticloak-logo-detailed.png" alt="Mysticloak" class="logo-img"><span class="logo-text">Mysticloak</span></a>
    <div class="nav-links">
      <a href="shop.html">Products</a>
      <a href="faq.html">FAQ</a>
      <a href="about.html">About</a>
      <a href="connect.html">Connect</a>
    </div>
  </nav>

  <main class="canceled">
    <div class="canceled-content">
      <div class="canceled-icon">&#10043;</div>
      <h1>Order Canceled</h1>
      <p>
        No worries &mdash; your order was canceled and you have not been charged.
        The enchantment will be waiting here whenever you're ready.
      </p>
      <div class="canceled-buttons">
        <a href="shop.html" class="btn primary">Back to Shop</a>
        <a href="index.html" class="btn secondary">Home</a>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Mysticloak &middot; <a href="https://azmyth.com">by Azmyth</a></p>
    <p class="footer-quote">each piece holds a spell, if you let it</p>
  </footer>

  <script src="js/magic.js"></script>

</html>
