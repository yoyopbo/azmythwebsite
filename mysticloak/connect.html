<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect | Mysticloak</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .connect-content {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
      text-align: center;
    }

    .connect-content p {
      color: var(--silver);
      font-style: italic;
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    .connect-links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    .connect-link {
      color: var(--gold);
      text-decoration: none;
      font-size: 1.1rem;
      letter-spacing: 1.5px;
      transition: all 0.3s ease;
      padding: 0.75rem 2rem;
      border: 1px solid rgba(201, 162, 39, 0.2);
      width: 100%;
      max-width: 350px;
    }

    .connect-link:hover {
      border-color: var(--gold);
      background: rgba(201, 162, 39, 0.1);
      text-shadow: 0 0 20px rgba(201, 162, 39, 0.5);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="magical-bg"></div>

  <nav>
    <a href="index.html" class="logo"><img src="images/brand/mysticloak-logo-detailed.png" alt="Mysticloak" class="logo-img"><span class="logo-text">Mysticloak</span></a>
    <div class="nav-links">
      <a href="shop.html">Products</a>
      <a href="faq.html">FAQ</a>
      <a href="about.html">About</a>
      <a href="connect.html" class="active">Connect</a>
    </div>
  </nav>

  <main class="page-content">
    <header class="page-header">
      <h1>Connect</h1>
      <p class="page-subtitle">Get in touch</p>
    </header>

    <section class="connect-content">
      <p>For custom orders, collaborations, or just to say hello &mdash; reach out through any of the channels below.</p>

      <div class="connect-links">
        <a href="https://instagram.com/yoyopbo" target="_blank" class="connect-link">Instagram</a>
        <a href="https://linktr.ee/Mysticloak" target="_blank" class="connect-link">Linktree</a>
        <a href="https://www.etsy.com/shop/Mysticloak" target="_blank" class="connect-link">Etsy Shop</a>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Mysticloak &middot; <a href="https://azmyth.com">by Azmyth</a></p>
    <p class="footer-quote">each piece holds a spell, if you let it</p>
  </footer>

  <script src="js/magic.js"></script>
</body>
</html>
